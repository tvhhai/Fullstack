<mat-toolbar class="header-toolbar" color="primary">
    <button
            type="button"
            aria-label="Toggle sidenav"
            mat-icon-button
            (click)="toggle()"
    >
        <mat-icon aria-label="Side nav toggle icon">
            {{ opened ? "menu" : "chevron_left" }}
        </mat-icon>
    </button>

    <span>App Header</span>
    <span class="example-spacer"></span>
    <div>
        <mat-slide-toggle [checked]="darkMode"
                          (change)="onToggleChange($event)">
        </mat-slide-toggle>
    </div>

    <app-language-switcher></app-language-switcher>
    <!--    <app-user></app-user>-->
</mat-toolbar>

<mat-divider></mat-divider>

<div class="header-toolbar-bottom">
    <!--    <app-breadcrumb></app-breadcrumb>-->
    <!--    <expense-wallet></expense-wallet>-->
</div>
