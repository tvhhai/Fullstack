<mat-sidenav-container class="sidebar-container">

        <app-sidebar></app-sidebar>
    </mat-sidenav>

    <mat-sidenav-content class="abc">
        <app-header
                class="app-header"
                (clicked)="toggleSideNav()"
        ></app-header>

        <div class="app-main-container">
            <div class="card-container">
                <router-outlet/>
            </div>
        </div>

    </mat-sidenav-content>
</mat-sidenav-container>
